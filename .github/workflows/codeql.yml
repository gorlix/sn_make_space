name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday 03:00 UTC

# Don't pile up CodeQL runs on rapid pushes.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Our own code only. java-kotlin is intentionally NOT scanned: the only
        # Kotlin here is stock React Native boilerplate (MainActivity/
        # MainApplication), and analyzing it requires a full Android build that
        # compiles the SDK's bundled Java from node_modules into the database —
        # paths-ignore can't filter compiled dependency code, so it produced
        # only unfixable third-party noise. JS/TS is the actual plugin logic.
        language: [javascript-typescript, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
